version: "3.9"

services:
  crowdsight:
    build: .
    container_name: crowdsight-api
    ports:
      - "8000:8000"
    environment:
      - WEIGHTS_PATH=checkpoints/best.pth
      - API_KEY=${API_KEY:-}          # set in .env to enable auth
      - MAX_IMAGE_MB=20
    volumes:
      - ./checkpoints:/app/checkpoints:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional MLflow tracking server — start with:
  #   docker compose --profile mlflow up
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    profiles: ["mlflow"]
    container_name: crowdsight-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow

volumes:
  mlflow_data:
