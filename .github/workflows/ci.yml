name: CrowdSight CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & syntax ────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Syntax check (ast.parse)
        run: |
          python - <<'EOF'
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path(".").rglob("*.py"):
              if any(part.startswith(".") for part in p.parts):
                  continue
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f"{p}:{e.lineno}: {e.msg}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('.').rglob('*.py')))} files OK")
          EOF

      - name: Ruff lint
        run: ruff check . --select=E,F,W,I --ignore=E501

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch + project deps
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install \
            numpy Pillow matplotlib scipy \
            fastapi uvicorn python-multipart \
            pytest pytest-cov

      - name: Install transformers (CLIP-EBC, skip heavy download)
        run: pip install "transformers>=4.35.0,<5.0.0" "huggingface_hub>=0.20.0"

      - name: Run tests
        env:
          # Prevent HuggingFace from downloading CLIP during tests
          # (CLIP-EBC tests are skipped when the model can't be fetched)
          TRANSFORMERS_OFFLINE: "1"
          HF_DATASETS_OFFLINE: "1"
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=model --cov=api \
            --cov-report=term-missing \
            --cov-report=xml \
            -k "not clip_ebc"   # skip CLIP-EBC until weights are cached

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── 3. Docker build ────────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: crowdsight:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Release weights (manual trigger only) ───────────────────────────────
  release:
    name: Export & publish weights
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers huggingface_hub numpy Pillow

      - name: Download checkpoints artifact
        uses: actions/download-artifact@v4
        with:
          name: checkpoints
          path: checkpoints/

      - name: Export weights
        run: |
          python release/export_weights.py \
            --batch \
            --input_dir  checkpoints/ \
            --output_dir release/weights/

      - name: Upload release weights artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-weights
          path: release/weights/
          retention-days: 90

      - name: Push to HuggingFace Hub
        if: env.HF_TOKEN != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          for f in release/weights/*.pth; do
            python release/export_weights.py \
              --input  "$f" \
              --output "$f" \
              --hub    "${{ vars.HF_REPO_ID }}" \
              --hf_token "$HF_TOKEN"
          done
